<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Habits</title>
<link rel="stylesheet" href="tokens.css">
<style>
/* ============================================================
   RESET + BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  font-weight: var(--w-reg);
  color: var(--ink);
  background: var(--paper);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button, input { font: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
input { background: transparent; border: none; outline: none; width: 100%; }
a { color: inherit; text-decoration: none; }

/* ============================================================
   LAYOUT
   ============================================================ */
.wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
}
.brand {
  display: flex; align-items: center; gap: 12px;
}
.brand-mark {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--blueberry); color: var(--oatmeal);
  display: grid; place-items: center;
  font-weight: 950; font-size: 18px; letter-spacing: -0.02em;
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-weight: 900; font-size: 20px; color: var(--blueberry);
  letter-spacing: -0.01em; line-height: 1;
}
.brand-sub {
  font-size: 12px; color: var(--ink-soft); font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase; margin-top: 3px;
}

.user-chip {
  display: flex; align-items: center; gap: 10px;
  background: var(--paper-pure);
  border: 1px solid var(--border);
  padding: 6px 6px 6px 14px;
  border-radius: 999px;
  box-shadow: var(--shadow-xs);
  font-size: 13px;
  color: var(--blueberry);
  font-weight: 700;
  max-width: 100%;
}
.user-chip .email { color: var(--ink-soft); font-weight: 500; font-size: 12px; margin-left: 4px; }
.user-chip button {
  padding: 6px 12px; border-radius: 999px;
  background: var(--oatmeal); color: var(--blueberry);
  font-weight: 700; font-size: 12px;
  transition: background .18s ease;
}
.user-chip button:hover { background: var(--oatmeal-deep); }

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: inline-flex; padding: 5px;
  background: var(--oatmeal); border-radius: 999px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-xs) inset;
}
.tab {
  padding: 9px 20px; border-radius: 999px;
  font-weight: 700; font-size: 14px;
  color: var(--ink-soft);
  transition: all .22s cubic-bezier(.22,.61,.36,1);
  letter-spacing: -0.005em;
}
.tab:hover:not(.active) { color: var(--blueberry); }
.tab.active {
  background: var(--paper-pure); color: var(--blueberry);
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   CARD SYSTEM
   ============================================================ */
.card {
  background: var(--paper-pure);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-xs);
  transition: box-shadow .22s ease, transform .22s ease;
}
.card--warm { background: var(--oatmeal-soft); }
.card--dark { background: var(--blueberry); color: var(--oatmeal); border-color: var(--blueberry-ink); }

.eyebrow {
  font-family: var(--font-display);
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.card--dark .eyebrow { color: var(--sky-blue); }

.card-title {
  font-weight: 900; font-size: 22px; color: var(--blueberry);
  letter-spacing: -0.015em; line-height: 1.2;
  margin-bottom: 4px;
}
.card--dark .card-title { color: var(--oatmeal); }

.card-sub {
  font-size: 14px; color: var(--ink-soft); font-weight: 500;
}
.card--dark .card-sub { color: var(--sky-blue); }

/* ============================================================
   DASHBOARD HOME CARD
   ============================================================ */
.hero {
  position: relative; overflow: hidden;
  background: var(--blueberry);
  color: var(--oatmeal);
  border-radius: var(--r-lg);
  padding: 32px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-md);
}
.hero::before {
  content: ''; position: absolute;
  right: -60px; top: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(242,168,158,.25), transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: ''; position: absolute;
  left: -100px; bottom: -100px;
  width: 260px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(198,225,222,.12), transparent 70%);
  pointer-events: none;
}
.hero-greeting {
  font-size: 13px; color: var(--sky-blue);
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 6px;
  position: relative; z-index: 1;
}
.hero-title {
  font-weight: 900; font-size: 34px;
  letter-spacing: -0.02em; line-height: 1.1;
  color: var(--oatmeal);
  position: relative; z-index: 1;
  max-width: 520px;
}
.hero-title em { font-style: normal; color: var(--berry); font-weight: 900; }
.hero-date {
  margin-top: 14px; font-size: 14px;
  color: var(--sky-blue); font-weight: 500;
  position: relative; z-index: 1;
}

.hero-stats {
  display: flex; gap: 24px; margin-top: 22px;
  position: relative; z-index: 1;
  flex-wrap: wrap;
}
.hero-stat {
  display: flex; flex-direction: column;
}
.hero-stat .n {
  font-weight: 950; font-size: 32px;
  color: var(--oatmeal); line-height: 1;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.hero-stat .l {
  font-size: 12px; color: var(--sky-blue);
  font-weight: 600; margin-top: 6px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.hero-stat + .hero-stat::before {
  content: ''; display: block; position: absolute;
}

/* ============================================================
   TODAY - BIG THING INPUT
   ============================================================ */
.big-thing-card {
  padding: 28px 28px 24px;
}
.big-thing-label {
  font-weight: 700; font-size: 18px;
  color: var(--blueberry);
  line-height: 1.3; margin-bottom: 14px;
  letter-spacing: -0.01em;
}
.big-thing-input {
  width: 100%; padding: 16px 20px;
  background: var(--oatmeal-soft);
  border: 1.5px solid transparent;
  border-radius: var(--r-md);
  font-weight: 600; font-size: 17px;
  color: var(--ink);
  transition: border-color .2s ease, background .2s ease;
}
.big-thing-input::placeholder { color: var(--ink-soft); font-weight: 500; }
.big-thing-input:focus {
  background: var(--paper-pure);
  border-color: var(--blueberry);
}

/* ============================================================
   YESTERDAY GOAL CALLOUT
   ============================================================ */
.yday-goal {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--berry-soft);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-bottom: 18px;
}
.yday-goal-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  border-radius: 50%;
  background: var(--paper-pure);
  display: grid; place-items: center;
  color: var(--berry-deep); font-weight: 900; font-size: 14px;
}
.yday-goal-body { flex: 1; min-width: 0; }
.yday-goal-label {
  font-size: 11px; color: var(--berry-deep);
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 3px;
}
.yday-goal-text {
  font-weight: 700; font-size: 15px;
  color: var(--blueberry); line-height: 1.35;
  letter-spacing: -0.005em;
}

/* ============================================================
   HABIT QUESTIONS (Yes/No)
   ============================================================ */
.q-list { display: flex; flex-direction: column; gap: 10px; }

.q-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  padding: 14px 16px 14px 18px;
  background: var(--oatmeal-soft);
  border-radius: var(--r-md);
  border: 1.5px solid transparent;
  transition: border-color .18s ease, background .18s ease;
}
.q-row:hover { border-color: var(--oatmeal-deep); }
.q-row.answered-yes { border-color: var(--spirulina-soft); background: #f0f6f2; }
.q-row.answered-no  { border-color: var(--berry-soft);     background: #fdf4f2; }

.q-text {
  font-weight: 600; font-size: 15.5px;
  color: var(--ink); line-height: 1.35;
  flex: 1; letter-spacing: -0.005em;
}

.yn-seg {
  display: inline-flex; padding: 3px;
  background: var(--paper-pure);
  border: 1px solid var(--border);
  border-radius: 999px; flex-shrink: 0;
}
.yn-btn {
  padding: 7px 16px; border-radius: 999px;
  font-weight: 700; font-size: 13px;
  color: var(--ink-soft);
  transition: all .18s ease;
  min-width: 52px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.yn-btn:hover:not(.on) { color: var(--blueberry); }
.yn-btn.on.yes { background: var(--spirulina); color: var(--paper-pure); }
.yn-btn.on.no  { background: var(--berry-deep); color: var(--paper-pure); }
.yn-btn svg { width: 12px; height: 12px; }

/* ============================================================
   PRIMARY BUTTON
   ============================================================ */
.btn-primary {
  width: 100%; padding: 16px 20px;
  background: var(--blueberry); color: var(--oatmeal);
  font-weight: 900; font-size: 16px;
  border-radius: var(--r-md);
  letter-spacing: -0.005em;
  transition: background .2s ease, transform .1s ease, box-shadow .2s ease;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover { background: var(--blueberry-ink); box-shadow: var(--shadow-md); }
.btn-primary:active { transform: scale(.98); }
.btn-primary.pending { opacity: .55; pointer-events: none; }

.btn-ghost {
  padding: 10px 18px; border-radius: 999px;
  background: var(--paper-pure);
  border: 1px solid var(--border);
  font-weight: 700; font-size: 13px;
  color: var(--blueberry);
  transition: all .18s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-ghost:hover { border-color: var(--blueberry); background: var(--oatmeal-soft); }

/* ============================================================
   COMPLETION HERO
   ============================================================ */
.completion {
  background: linear-gradient(145deg, #1d6b75, var(--blueberry) 60%, #0f434b);
  color: var(--oatmeal);
  border-radius: var(--r-lg);
  padding: 48px 32px 40px;
  text-align: center;
  position: relative; overflow: hidden;
  margin-bottom: 18px;
  box-shadow: var(--shadow-md);
}
.completion::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 15% 85%, rgba(242,168,158,.2), transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(198,225,222,.15), transparent 45%);
  pointer-events: none;
}
.tick-wrap {
  width: 84px; height: 84px; margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--spirulina);
  display: grid; place-items: center;
  box-shadow: 0 10px 30px rgba(59,138,115,.45), inset 0 -4px 0 rgba(0,0,0,.08);
  position: relative; z-index: 1;
  animation: tickPop .5s cubic-bezier(.22,1.3,.36,1) both;
}
.tick-wrap svg { width: 46px; height: 46px; }
.tick-wrap .tick-path {
  fill: none; stroke: var(--paper-pure);
  stroke-width: 5; stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 60; stroke-dashoffset: 60;
  animation: tickDraw .5s .3s cubic-bezier(.22,.8,.36,1) forwards;
}
@keyframes tickPop {
  from { transform: scale(.3); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
@keyframes tickDraw {
  to { stroke-dashoffset: 0; }
}
.completion h2 {
  font-weight: 950; font-size: 32px;
  color: var(--oatmeal); margin-bottom: 8px;
  letter-spacing: -0.02em; line-height: 1.1;
  position: relative; z-index: 1;
  text-transform: none;
}
.completion p {
  color: var(--sky-blue); font-size: 15px;
  max-width: 420px; margin: 0 auto;
  position: relative; z-index: 1;
}
.completion .quoted {
  margin: 22px auto 0; max-width: 440px;
  padding: 14px 18px;
  background: rgba(253,248,240,.08);
  border: 1px solid rgba(253,248,240,.18);
  border-radius: var(--r-md);
  position: relative; z-index: 1;
  font-weight: 700; font-size: 15px;
  color: var(--oatmeal);
  letter-spacing: -0.005em;
}
.completion .quoted .q-eyebrow {
  font-size: 10px; color: var(--berry);
  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 4px;
}
.completion-actions {
  margin-top: 26px; display: flex; gap: 10px; justify-content: center;
  position: relative; z-index: 1;
  flex-wrap: wrap;
}
.completion-actions .btn-ghost {
  background: rgba(253,248,240,.12);
  border-color: rgba(253,248,240,.3);
  color: var(--oatmeal);
}
.completion-actions .btn-ghost:hover {
  background: rgba(253,248,240,.22);
  border-color: var(--oatmeal);
}

/* Tiny confetti dots inside completion */
.confetti {
  position: absolute; inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.confetti span {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  opacity: 0; animation: confetti 1.4s ease-out forwards;
}
@keyframes confetti {
  0%   { transform: translateY(0) scale(0); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(-140px) translateX(var(--dx,0)) scale(1); opacity: 0; }
}

/* ============================================================
   HISTORY - STREAKS HERO
   ============================================================ */
.streaks-hero {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 18px;
  margin-bottom: 18px;
}

.streak-flagship {
  background: var(--blueberry); color: var(--oatmeal);
  border-radius: var(--r-lg);
  padding: 28px 28px 24px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-md);
}
.streak-flagship .flag-eyebrow {
  font-size: 11px; color: var(--berry);
  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.streak-flagship h3 {
  font-weight: 900; font-size: 18px;
  color: var(--oatmeal); margin-bottom: 14px;
  letter-spacing: -0.01em; line-height: 1.2;
  position: relative; z-index: 1;
  text-transform: none;
}
.streak-flagship .big-num {
  font-weight: 950; font-size: 96px;
  line-height: 0.9;
  color: var(--oatmeal);
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  position: relative; z-index: 1;
  display: flex; align-items: baseline; gap: 10px;
}
.streak-flagship .big-num .unit {
  font-size: 22px; font-weight: 700;
  color: var(--sky-blue); letter-spacing: -0.01em;
}
.streak-flagship .best-line {
  margin-top: 12px;
  font-size: 14px; color: var(--sky-blue);
  font-weight: 500;
  position: relative; z-index: 1;
}
.streak-flagship .best-line b { color: var(--oatmeal); font-weight: 700; }
.streak-flagship::after {
  content: ''; position: absolute;
  right: -50px; top: -50px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(242,168,158,.22), transparent 65%);
  pointer-events: none;
}

.streak-list {
  display: flex; flex-direction: column; gap: 10px;
}
.streak-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--paper-pure);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  transition: all .18s ease;
}
.streak-row:hover { border-color: var(--blueberry); transform: translateX(2px); }
.streak-row .r-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  border-radius: 12px;
  display: grid; place-items: center;
  background: var(--oatmeal);
  color: var(--blueberry);
}
.streak-row .r-icon svg { width: 20px; height: 20px; }
.streak-row .r-body { flex: 1; min-width: 0; }
.streak-row .r-label {
  font-weight: 700; font-size: 14px;
  color: var(--blueberry); letter-spacing: -0.005em;
  line-height: 1.2;
}
.streak-row .r-best {
  font-size: 12px; color: var(--ink-soft);
  font-weight: 500; margin-top: 2px;
}
.streak-row .r-val {
  font-weight: 950; font-size: 26px;
  color: var(--blueberry);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1;
}
.streak-row .r-val .unit {
  font-size: 11px; color: var(--ink-soft);
  font-weight: 700; margin-left: 3px;
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* ============================================================
   HISTORY - CONTRIBUTION GRID (per-habit, last 90 days)
   ============================================================ */
.grid-card { padding: 24px 24px 20px; }
.grid-card h3 {
  font-weight: 900; font-size: 20px;
  color: var(--blueberry); margin-bottom: 4px;
  letter-spacing: -0.01em;
  text-transform: none;
}
.grid-card .sub {
  font-size: 13px; color: var(--ink-soft);
  margin-bottom: 18px;
}

.habit-grid {
  display: grid; grid-template-columns: 110px 1fr;
  gap: 4px 12px;
  align-items: center;
}
.habit-grid .hg-label {
  font-weight: 700; font-size: 12.5px;
  color: var(--blueberry);
  letter-spacing: -0.005em;
  padding: 4px 0;
  line-height: 1.2;
}
.hg-cells {
  display: grid;
  grid-auto-flow: column; grid-auto-columns: 1fr;
  grid-template-rows: repeat(1, 1fr);
  gap: 3px;
  height: 22px;
}
.hg-cell {
  border-radius: 3px;
  background: var(--oatmeal);
  transition: transform .12s ease;
  cursor: pointer;
  position: relative;
}
.hg-cell:hover { transform: scale(1.4); z-index: 2; }
.hg-cell.none    { background: var(--oatmeal); cursor: default; }
.hg-cell.good    { background: var(--spirulina); }
.hg-cell.good-2  { background: #5aa48d; }
.hg-cell.bad     { background: var(--berry); }
.hg-cell.bad-2   { background: #f6c7bf; }
.hg-cell.today-outline { outline: 2px solid var(--blueberry); outline-offset: 1px; z-index: 1; }

.grid-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap; gap: 10px;
}
.grid-legend {
  display: flex; gap: 14px; align-items: center;
  font-size: 12px; color: var(--ink-soft); font-weight: 500;
}
.grid-legend-swatch {
  display: inline-flex; align-items: center; gap: 3px;
}
.grid-legend-swatch b {
  width: 10px; height: 10px; border-radius: 2px;
  display: inline-block;
}
.grid-range-pills {
  display: inline-flex; padding: 3px; gap: 2px;
  background: var(--oatmeal); border-radius: 999px;
}
.grid-range-pills button {
  padding: 5px 12px; border-radius: 999px;
  font-weight: 700; font-size: 12px;
  color: var(--ink-soft);
  transition: all .18s ease;
}
.grid-range-pills button.on {
  background: var(--paper-pure); color: var(--blueberry);
  box-shadow: var(--shadow-xs);
}

/* ============================================================
   HISTORY - RECENT ENTRIES (card list)
   ============================================================ */
.recent-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin: 10px 0 14px;
}
.recent-head h3 {
  font-weight: 900; font-size: 20px;
  color: var(--blueberry); letter-spacing: -0.01em;
  text-transform: none;
}
.recent-head .count { font-size: 13px; color: var(--ink-soft); font-weight: 500; }

.entry-list { display: flex; flex-direction: column; gap: 10px; }
.entry-card {
  background: var(--paper-pure);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 16px; align-items: center;
  transition: all .18s ease;
}
.entry-card:hover {
  border-color: var(--blueberry);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}
.entry-date {
  text-align: center;
  padding: 6px 0; border-radius: 10px;
  background: var(--oatmeal-soft);
  line-height: 1;
}
.entry-date .d {
  font-weight: 950; font-size: 20px; color: var(--blueberry);
  letter-spacing: -0.02em;
}
.entry-date .m {
  font-size: 10px; color: var(--ink-soft); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: 2px;
}
.entry-body { min-width: 0; }
.entry-goal {
  font-weight: 700; font-size: 14.5px; color: var(--blueberry);
  letter-spacing: -0.005em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.entry-pills { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.entry-pill {
  font-size: 10.5px; font-weight: 700;
  padding: 3px 8px; border-radius: 999px;
  letter-spacing: 0.02em;
  display: inline-flex; align-items: center; gap: 3px;
}
.entry-pill.good {
  background: #e4f0ea; color: var(--spirulina);
}
.entry-pill.bad {
  background: #fbe5e1; color: var(--berry-deep);
}
.entry-pill svg { width: 9px; height: 9px; }
.entry-score {
  font-weight: 950; font-size: 22px; color: var(--blueberry);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  text-align: right;
  line-height: 1;
}
.entry-score small {
  font-size: 12px; color: var(--ink-soft); font-weight: 500;
  display: block; margin-top: 2px;
  letter-spacing: 0;
}

/* ============================================================
   DONE TODAY BANNER (small)
   ============================================================ */
.logged-banner {
  display: flex; align-items: center; gap: 12px;
  background: #e4f0ea;
  color: var(--spirulina);
  border-radius: var(--r-md);
  padding: 12px 16px; margin-bottom: 16px;
  font-weight: 700; font-size: 14px;
}
.logged-banner svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ============================================================
   SIGN-IN
   ============================================================ */
.signin-screen {
  min-height: 100vh;
  background: var(--paper);
  display: grid; place-items: center;
  padding: 24px;
  position: relative; overflow: hidden;
}
.signin-screen::before {
  content: ''; position: absolute;
  top: -200px; right: -200px; width: 500px; height: 500px;
  background: radial-gradient(circle, var(--sky-blue) 0%, transparent 60%);
  opacity: 0.6; pointer-events: none;
}
.signin-screen::after {
  content: ''; position: absolute;
  bottom: -200px; left: -200px; width: 500px; height: 500px;
  background: radial-gradient(circle, var(--berry-soft) 0%, transparent 60%);
  opacity: 0.4; pointer-events: none;
}
.signin-card {
  position: relative;
  background: var(--paper-pure);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 48px 44px;
  max-width: 420px; width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.signin-mark {
  width: 64px; height: 64px; margin: 0 auto 20px;
  border-radius: 20px;
  background: var(--blueberry); color: var(--oatmeal);
  display: grid; place-items: center;
  font-weight: 950; font-size: 26px; letter-spacing: -0.02em;
  box-shadow: var(--shadow-md);
}
.signin-card h1 {
  font-weight: 950; font-size: 34px;
  color: var(--blueberry); letter-spacing: -0.02em;
  line-height: 1.1; margin-bottom: 6px;
  text-transform: none;
}
.signin-card .eyebrow { margin-bottom: 20px; color: var(--berry-deep); }
.signin-card p {
  color: var(--ink-soft); font-size: 15px;
  margin-bottom: 28px; line-height: 1.5;
  max-width: 320px; margin-left: auto; margin-right: auto;
}
.google-btn {
  width: 100%; padding: 15px;
  background: var(--blueberry); color: var(--oatmeal);
  border-radius: var(--r-md);
  font-weight: 900; font-size: 15.5px;
  letter-spacing: -0.005em;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: all .18s ease;
}
.google-btn:hover { background: var(--blueberry-ink); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.google-btn svg { flex-shrink: 0; background: var(--paper-pure); border-radius: 4px; padding: 2px; }

.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 16px;
  color: var(--ink-soft); font-size: 12px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.demo-btn {
  width: 100%; padding: 14px;
  background: var(--oatmeal); color: var(--blueberry);
  border-radius: var(--r-md);
  font-weight: 800; font-size: 14.5px;
  transition: all .18s ease;
  letter-spacing: -0.005em;
}
.demo-btn:hover { background: var(--oatmeal-deep); }

/* ============================================================
   DEMO NOTICE
   ============================================================ */
.demo-notice {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  background: var(--berry-soft);
  border-radius: var(--r-md);
  padding: 10px 12px 10px 16px;
  margin-bottom: 18px;
  font-size: 13px;
}
.demo-notice .dn-text {
  color: var(--berry-deep); font-weight: 700;
}
.demo-notice .dn-text small {
  color: var(--blueberry); font-weight: 500; margin-left: 8px;
  font-size: 12px;
}
.demo-notice button {
  padding: 7px 14px; border-radius: 999px;
  background: var(--blueberry); color: var(--oatmeal);
  font-weight: 700; font-size: 12px;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(18, 39, 42, 0.55);
  backdrop-filter: blur(2px);
  z-index: 100; overflow-y: auto;
  padding: 40px 16px;
  animation: overlayIn .2s ease;
}
.modal-overlay.open { display: block; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--paper);
  border-radius: var(--r-lg);
  max-width: 600px; margin: 0 auto;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: modalIn .28s cubic-bezier(.22,.8,.36,1);
}
@keyframes modalIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-header {
  background: var(--blueberry); color: var(--oatmeal);
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h2 {
  font-weight: 900; font-size: 18px;
  color: var(--oatmeal); letter-spacing: -0.01em;
  line-height: 1.2;
  text-transform: none;
}
.modal-close {
  color: var(--oatmeal); font-size: 20px;
  padding: 4px 10px; border-radius: 8px;
  transition: background .15s ease;
}
.modal-close:hover { background: rgba(253,248,240,.15); }
.modal-body { padding: 22px 24px 24px; }
.modal-body .card { margin-bottom: 14px; }

/* ============================================================
   LOADING
   ============================================================ */
.loading {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  padding: 80px 20px; color: var(--ink-soft);
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--oatmeal);
  border-top-color: var(--blueberry);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   FOOTER
   ============================================================ */
footer {
  margin-top: 48px; padding-top: 18px;
  border-top: 1px solid var(--border);
  font-size: 12.5px; color: var(--ink-soft);
  text-align: center; font-weight: 500;
}
footer svg { display: inline; vertical-align: -2px; margin-right: 4px; width: 14px; height: 14px; }

/* ============================================================
   ENTRY ANIMATIONS
   ============================================================ */
.fade-in {
  animation: fadeIn .36s cubic-bezier(.22,.61,.36,1) both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stagger > * { animation: fadeIn .36s cubic-bezier(.22,.61,.36,1) both; }
.stagger > *:nth-child(1) { animation-delay: .02s; }
.stagger > *:nth-child(2) { animation-delay: .06s; }
.stagger > *:nth-child(3) { animation-delay: .10s; }
.stagger > *:nth-child(4) { animation-delay: .14s; }
.stagger > *:nth-child(5) { animation-delay: .18s; }
.stagger > *:nth-child(6) { animation-delay: .22s; }
.stagger > *:nth-child(7) { animation-delay: .26s; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty {
  padding: 48px 24px; text-align: center;
  border-radius: var(--r-lg);
  background: var(--oatmeal-soft);
  border: 1px dashed var(--oatmeal-deep);
}
.empty-emoji {
  font-size: 36px; margin-bottom: 12px;
  color: var(--berry-deep);
  font-weight: 950;
  display: inline-block;
  width: 56px; height: 56px;
  background: var(--paper-pure);
  border-radius: 18px;
  display: grid; place-items: center;
  margin: 0 auto 16px;
  box-shadow: var(--shadow-sm);
}
.empty-emoji svg { width: 28px; height: 28px; color: var(--berry-deep); }
.empty h3 {
  font-weight: 900; font-size: 20px;
  color: var(--blueberry); margin-bottom: 6px;
  letter-spacing: -0.01em;
  text-transform: none;
}
.empty p {
  color: var(--ink-soft); font-size: 14.5px;
  max-width: 340px; margin: 0 auto;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  .wrap { padding: 20px 16px 40px; }
  .hero { padding: 24px 20px; }
  .hero-title { font-size: 26px; }
  .hero-stat .n { font-size: 26px; }
  .streaks-hero { grid-template-columns: 1fr; }
  .streak-flagship .big-num { font-size: 76px; }
  .big-thing-label { font-size: 16px; }
  .q-row { flex-direction: row; }
  .q-text { font-size: 14px; }
  .yn-btn { padding: 6px 12px; min-width: 48px; font-size: 12px; }
  .card { padding: 20px; }
  .completion { padding: 36px 22px 30px; }
  .completion h2 { font-size: 26px; }
  .tick-wrap { width: 72px; height: 72px; }
  .tick-wrap svg { width: 40px; height: 40px; }
  .entry-card { grid-template-columns: 52px 1fr; gap: 12px; }
  .entry-score { grid-column: 2; text-align: left; margin-top: 6px; font-size: 18px; }
  .habit-grid { grid-template-columns: 90px 1fr; gap: 3px 8px; }
  .habit-grid .hg-label { font-size: 11.5px; }
  .signin-card { padding: 36px 24px; }
  .signin-card h1 { font-size: 28px; }
  .grid-foot { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- ============================================================
     SIGN-IN SCREEN
     ============================================================ -->
<div id="signInScreen" class="signin-screen">
  <div class="signin-card">
    <div class="signin-mark">dh</div>
    <h1>Daily Habits</h1>
    <div class="eyebrow">Your daily check-in</div>
    <p>Sign in to pick up where you left off. Your streaks and entries sync across every device.</p>
    <button class="google-btn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.5 5C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.6-2.7 4.7-5 6l6.2 5.2C40.5 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Sign in with Google
    </button>
    <div class="or-divider">or</div>
    <button class="demo-btn" onclick="enterDemoMode()">Preview the app</button>
  </div>
</div>

<!-- ============================================================
     APP
     ============================================================ -->
<div id="appScreen" style="display:none">
  <div class="wrap">

    <div class="app-header">
      <div class="brand">
        <div class="brand-mark">dh</div>
        <div>
          <div class="brand-name">Daily Habits</div>
          <div class="brand-sub">Your daily check-in</div>
        </div>
      </div>
      <div id="userBar"></div>
    </div>

    <div class="demo-notice" id="demoNotice" style="display:none">
      <div class="dn-text">Demo mode <small>Sample data, read only</small></div>
      <button onclick="exitDemoMode()">Sign in &rarr;</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab(this,'today')">Today</button>
      <button class="tab" onclick="showTab(this,'history')">History</button>
    </div>

    <div id="tab-today"><div class="loading"><div class="spinner"></div><div>Loading your day&hellip;</div></div></div>
    <div id="tab-history" style="display:none"></div>

    <footer>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Your data syncs securely via Firebase, accessible from any device.
    </footer>
  </div>
</div>

<!-- ============================================================
     MODAL
     ============================================================ -->
<div class="modal-overlay" id="editModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Edit entry</h2>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
